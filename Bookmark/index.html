<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickAccess Hub</title>
    <style>
        :root {
            /* Light Theme */
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: white;
            --text-secondary: rgba(255, 255, 255, 0.9);
            --card-text: #333;
            --card-description: #666;
            --shadow: rgba(0, 0, 0, 0.1);
            --shadow-hover: rgba(0, 0, 0, 0.2);
            --search-bg: rgba(255, 255, 255, 0.95);
            --search-text: #333;
            --badge-free: #51cf66;
            --badge-premium: #ffd43b;
            --badge-popular: #ff6b6b;
            --floating-btn: #fff;
            --floating-text: #333;
            --alert-bg: #fff3cd;
            --alert-border: #ffeaa7;
            --alert-text: #856404;
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-gradient: linear-gradient(135deg, #2D3748 0%, #4A5568 100%);
            --card-bg: rgba(45, 55, 72, 0.95);
            --text-primary: #E2E8F0;
            --text-secondary: #A0AEC0;
            --card-text: #E2E8F0;
            --card-description: #A0AEC0;
            --shadow: rgba(0, 0, 0, 0.3);
            --shadow-hover: rgba(0, 0, 0, 0.5);
            --search-bg: rgba(45, 55, 72, 0.95);
            --search-text: #E2E8F0;
            --badge-free: #2b6cb0;
            --badge-premium: #d69e2e;
            --badge-popular: #e53e3e;
            --floating-btn: #2D3748;
            --floating-text: #E2E8F0;
            --alert-bg: #464f1a;
            --alert-border: #5a6216;
            --alert-text: #e9ecef;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Welcome Alert */
        .welcome-alert {
            background: var(--alert-bg);
            border: 2px solid var(--alert-border);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            color: var(--alert-text);
            box-shadow: 0 5px 15px var(--shadow);
            display: flex;
            align-items: center;
            gap: 15px;
            animation: slideDown 0.5s ease-out;
        }

        .welcome-alert.hidden {
            display: none;
        }

        .alert-icon {
            font-size: 2rem;
            flex-shrink: 0;
        }

        .alert-content {
            flex: 1;
        }

        .alert-content h3 {
            margin-bottom: 5px;
            font-size: 1.2rem;
        }

        .alert-content p {
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .alert-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .alert-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .alert-btn.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .alert-btn.secondary {
            background: transparent;
            border: 2px solid var(--alert-border);
            color: var(--alert-text);
        }

        .alert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .close-alert {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--alert-text);
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .close-alert:hover {
            opacity: 1;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header Styles */
        .header {
            text-align: center;
            margin-bottom: 50px;
            color: var(--text-primary);
            position: relative;
        }

        .header-buttons {
            position: absolute;
            top: 0;
            right: 0;
            display: flex;
            gap: 10px;
        }

        .theme-toggle, .feedback-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 12px 20px;
            border-radius: 25px;
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle:hover, .feedback-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .header h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        /* Categories Grid */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .category-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 8px 25px var(--shadow);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            color: var(--card-text);
        }

        .category-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px var(--shadow-hover);
            border-color: #667eea;
        }

        .category-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        [data-theme="dark"] .category-icon {
            background: linear-gradient(135deg, #63B3ED, #B794F4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .category-card h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--card-text);
        }

        .category-card p {
            color: var(--card-description);
            line-height: 1.6;
        }

        /* Badges */
        .badges {
            margin-top: 15px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 8px;
            font-weight: 600;
        }

        .badge.free {
            background: var(--badge-free);
        }

        .badge.premium {
            background: var(--badge-premium);
            color: #1a202c;
        }

        .badge.popular {
            background: var(--badge-popular);
        }

        /* Floating Button */
        .floating-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--floating-btn);
            color: var(--floating-text);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 5px 15px var(--shadow);
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }

        .floating-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px var(--shadow-hover);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }
            
            .categories-grid {
                grid-template-columns: 1fr;
            }
            
            .header-buttons {
                position: relative;
                justify-content: center;
                margin-bottom: 20px;
                gap: 15px;
            }

            .welcome-alert {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }

            .alert-buttons {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .category-card {
                padding: 20px;
            }

            .header-buttons {
                flex-direction: column;
                align-items: center;
            }

            .theme-toggle, .feedback-btn {
                width: 200px;
                justify-content: center;
            }
        }

        /* Animation for cards */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .category-card {
            animation: fadeInUp 0.6s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Welcome Alert -->
        <div class="welcome-alert" id="welcomeAlert">
            <div class="alert-icon">💡</div>
            <div class="alert-content">
                <h3>Welcome to QuickAccess Hub!</h3>
                <p>Don't forget to share your feedback and suggestions to help us improve! Your ideas matter! 🚀</p>
                <div class="alert-buttons">
                    <a href="feedback.html" class="alert-btn primary">Share Feedback</a>
                    <button class="alert-btn secondary" onclick="remindLater()">Remind Later</button>
                </div>
            </div>
            <button class="close-alert" onclick="closeAlert()">×</button>
        </div>

        <div class="header">
            <div class="header-buttons">
                <button class="theme-toggle" onclick="toggleTheme()">
                    🌙 Dark Mode
                </button>
                <a href="feedback.html" class="feedback-btn">
                    💡 Feedback
                </a>
            </div>
            <h1>QuickAccess Hub</h1>
            <p>All your essential tools in one place</p>
        </div>

        <div class="categories-grid" id="categoriesGrid">
            <!-- Categories will be loaded here by JavaScript -->
        </div>
    </div>

    <button class="floating-btn" onclick="scrollToTop()">↑</button>

    <script>
        // Alert functionality
        function showAlert() {
            const alert = document.getElementById('welcomeAlert');
            // Check if user has already closed the alert today
            const lastClosed = localStorage.getItem('alertLastClosed');
            const today = new Date().toDateString();
            
            if (lastClosed !== today) {
                alert.classList.remove('hidden');
            }
        }

        function closeAlert() {
            const alert = document.getElementById('welcomeAlert');
            alert.classList.add('hidden');
            // Remember when user closed the alert
            localStorage.setItem('alertLastClosed', new Date().toDateString());
        }

        function remindLater() {
            const alert = document.getElementById('welcomeAlert');
            alert.classList.add('hidden');
            // Show again after 1 hour
            setTimeout(() => {
                localStorage.removeItem('alertLastClosed');
            }, 60 * 60 * 1000); // 1 hour
        }

        // Theme functionality
        function toggleTheme() {
            const html = document.documentElement;
            const themeToggle = document.querySelector('.theme-toggle');
            const currentTheme = html.getAttribute('data-theme');
            
            if (currentTheme === 'dark') {
                html.removeAttribute('data-theme');
                themeToggle.textContent = '🌙 Dark Mode';
                themeToggle.title = 'Switch to dark mode';
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️ Light Mode';
                themeToggle.title = 'Switch to light mode';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Load saved theme from localStorage
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            const themeToggle = document.querySelector('.theme-toggle');
            
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️ Light Mode';
                themeToggle.title = 'Switch to light mode';
            } else {
                themeToggle.textContent = '🌙 Dark Mode';
                themeToggle.title = 'Switch to dark mode';
            }
        }

        // Categories data
        const categories = [
            {
                icon: "🎮",
                title: "Gaming & Downloads",
                description: "Free and premium game download sites, mods, and gaming platforms",
                tags: ["free", "premium"],
                link: "gaming.html"
            },
            {
                icon: "🎨",
                title: "Photo Editing",
                description: "Online photo editors, filters, and creative tools",
                tags: ["free", "premium"],
                link: "photo.html"
            },
            {
                icon: "📚",
                title: "Study and other usefull resources ",
                description: "Educational platforms, e-books, and learning tools",
                tags: ["free"],
                link: "study.html"
            },
            {
                icon: "🎬",
                title: "Video Tools",
                description: "Video editors, converters, and streaming platforms",
                tags: ["free", "premium"],
                link: "video.html"
            },
            {
                icon: "💼",
                title: "Productivity",
                description: "Tools to boost your efficiency and organization",
                tags: ["free", "premium"],
                link: "productivity.html"
            },
            {
                icon: "👻",
                title: "Some randoms but useful",
                description: "Here are some websites that may help you  ",
                tags: ["free", "premium"],
                link: "random.html"
            }
        ];

        // Display categories
        function displayCategories(categoriesToShow = categories) {
            const grid = document.getElementById('categoriesGrid');
            grid.innerHTML = '';

            categoriesToShow.forEach((category, index) => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.style.animationDelay = `${index * 0.1}s`;
                card.innerHTML = `
                    <div class="category-icon">${category.icon}</div>
                    <h3>${category.title}</h3>
                    <p>${category.description}</p>
                    <div class="badges">
                        ${category.tags.map(tag => 
                            `<span class="badge ${tag}">${tag}</span>`
                        ).join('')}
                </div>
                `;
                
                card.addEventListener('click', function() {
                    if (category.link) {
                        window.location.href = category.link;
                    } else {
                        alert(`Opening ${category.title} category!`);
                    }
                });
                
                grid.appendChild(card);
            });
        }

        // Scroll to top function
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        // Show/hide floating button based on scroll
        function setupFloatingButton() {
            const floatingBtn = document.querySelector('.floating-btn');
            
            window.addEventListener('scroll', function() {
                if (window.pageYOffset > 300) {
                    floatingBtn.style.opacity = '1';
                    floatingBtn.style.visibility = 'visible';
                } else {
                    floatingBtn.style.opacity = '0';
                    floatingBtn.style.visibility = 'hidden';
                }
            });
        }

        // Initialize everything when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadTheme();
            displayCategories();
            setupFloatingButton();
            showAlert(); // Show the welcome alert
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            // Escape to close alert
            if (e.key === 'Escape') {
                closeAlert();
            }
        });
    </script>
       <!-- Footer Credit -->
    <div class="footer-credit">
        <p>Made by Syed Hammas Ali</p>
    </div>

    <style>
        .footer-credit {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .footer-credit:hover {
            opacity: 1;
        }

        .footer-credit p {
            margin: 0;
        }
    </style>
</body>
</html>
